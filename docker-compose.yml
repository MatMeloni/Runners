# Requer `.env` na raiz com DATABASE_URL do Supabase (veja .env.example).
# Não há serviço Postgres local: a API e o Streamlit usam o banco na nuvem.

services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "${API_HOST}",
        "--port",
        "${API_PORT}",
      ]

  streamlit:
    build: .
    env_file:
      - .env
    ports:
      - "${STREAMLIT_PORT}:${STREAMLIT_PORT}"
    command:
      [
        "streamlit",
        "run",
        "streamlit_app/app.py",
        "--server.port=${STREAMLIT_PORT}",
        "--server.address=0.0.0.0",
      ]
    volumes:
      - ./data:/app/data
      - ./config:/app/config
