# Runners — stack completa local via Docker Compose
#
# Pré-requisito: arquivo .env na raiz (copie .env.example e preencha os valores).
# Variáveis obrigatórias: DATABASE_URL, SUPABASE_JWT_SECRET,
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#
# Portas padrão (sobrescrevíveis no .env):
#   API  → http://localhost:8000
#   Web  → http://localhost:3000
#
# Iniciar:   docker compose up --build
# Só API:    docker compose up --build api
# Parar:     docker compose down

services:
  api:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    # alembic cria/atualiza tabelas no Supabase antes de subir o servidor
    command:
      - sh
      - -c
      - >
        alembic upgrade head &&
        uvicorn api.main:app
        --host 0.0.0.0
        --port ${API_PORT:-8000}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8000}/health')"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build:
      context: ./runners-web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* são embutidos no bundle em tempo de build.
        # O browser acessa a API via localhost, não pelo nome do container.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-8000}}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  streamlit:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "${STREAMLIT_PORT:-8501}:${STREAMLIT_PORT:-8501}"
    command:
      - sh
      - -c
      - >
        streamlit run streamlit_app/app.py
        --server.port ${STREAMLIT_PORT:-8501}
        --server.address 0.0.0.0
    profiles:
      - streamlit
